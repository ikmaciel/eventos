<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STANDE · Sistema Gerenciador de Eventos · UX + Contadores</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Arquivos externos obrigatórios -->
  <script src="paises.js"></script>
  <script src="ufs.js"></script>
  <script src="regiao.js"></script>
  <script src="tipodeevento.js"></script>
  <script src="tagueamento.js"></script>
  <style>
    body {
      background: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .transition-fade {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .tooltip {
      position: relative;
      cursor: help;
    }
    .tooltip:hover:after,
    .tooltip:focus:after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      z-index: 10;
      margin-bottom: 6px;
    }
    .invalid {
      border-color: #f87171 !important;
      background-color: #fee2e2 !important;
    }
    .char-counter {
      font-size: 0.7rem;
      color: #94a3b8;
      text-align: right;
      margin-top: 0.25rem;
    }
    #toast {
      transition: opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
    }
    .section-campaign,
    .section-event {
      transition: all 0.2s ease;
    }
    .hidden-section {
      display: none !important;
    }
    .required-asterisk::after {
      content: "";
      color: #ef4444;
      font-weight: bold;
    }
    /* Estilos do nosso formulário de eventos */
    .tab-active {
      border-color: #2563eb;
      color: #2563eb;
      background-color: #eff6ff;
    }
    .tab-inactive {
      border-color: transparent;
      color: #94a3b8;
    }
    .tab-inactive:hover {
      color: #475569;
      background-color: #f8fafc;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.6rem;
      border-radius: 0.5rem;
      font-size: 0.65rem;
      font-weight: 700;
      border: 1px solid;
      margin: 0.125rem;
    }
    .chip-blue {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }
    .chip-green {
      background: #ecfdf5;
      color: #047857;
      border-color: #a7f3d0;
    }
    .chip-slate {
      background: #f1f5f9;
      color: #475569;
      border-color: #e2e8f0;
    }
    .tag-automatica {
      @apply chip chip-blue;
    }
    .tag-manual {
      @apply chip chip-green;
    }
    .tag-remove {
      margin-left: 0.25rem;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.2s;
    }
    .tag-remove:hover {
      color: #475569;
    }
    .autocomplete-list {
      position: absolute;
      z-index: 50;
      width: 100%;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 0 0 1rem 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      max-height: 12rem;
      overflow-y: auto;
      margin-top: 0.25rem;
      display: none;
    }
    .autocomplete-item {
      padding: 0.75rem;
      cursor: pointer;
      font-size: 0.875rem;
      color: #334155;
      transition: background 0.15s;
      border-bottom: 1px solid #f1f5f9;
    }
    .autocomplete-item:hover {
      background: #eff6ff;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .checkbox-input {
      width: 1rem;
      height: 1rem;
      border-radius: 0.25rem;
      border-color: #cbd5e1;
      color: #2563eb;
    }
    .radio-group {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      color: #334155;
    }
    .radio-input {
      width: 1rem;
      height: 1rem;
      border-color: #cbd5e1;
      color: #2563eb;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="max-w-6xl w-full bg-white rounded-3xl shadow-2xl p-8 space-y-8">

    <!-- Cabeçalho com botão de reset e atalho -->
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="text-center sm:text-left">
        <h1 class="text-3xl font-black text-gray-800">SGE · Gerador Eloqua</h1>
        <p class="text-sm text-gray-500 mt-1">Preencha os campos. O nome combinado é gerado automaticamente.</p>
      </div>
      <button id="resetBtn"
        class="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl shadow transition-all uppercase tracking-wider text-sm">
        ↻ Limpar tudo <span class="text-xs font-normal ml-1 opacity-60">(Ctrl+L)</span>
      </button>
    </div>

    <!-- Seletor de modo -->
    <div class="bg-gray-100 p-4 rounded-xl flex flex-wrap items-center gap-6">
      <span class="text-sm font-semibold text-gray-600">Modo de registro:</span>
      <label class="inline-flex items-center gap-2 text-sm">
        <input type="radio" name="mode" value="both" checked> Ambos (Campanha + Evento)
      </label>
      <label class="inline-flex items-center gap-2 text-sm">
        <input type="radio" name="mode" value="campaign"> Apenas Campanha
      </label>
      <label class="inline-flex items-center gap-2 text-sm">
        <input type="radio" name="mode" value="event"> Apenas Evento
      </label>
      <div class="text-xs text-gray-400 ml-auto">Atalho: Ctrl+L limpa tudo</div>
    </div>

    <div class="grid md:grid-cols-2 gap-8" id="columnsContainer">
      <!-- COLUNA ESQUERDA: CAMPANHA (mantida intacta) -->
      <div class="section-campaign bg-green-50/50 rounded-2xl border border-green-100 p-6 space-y-4">
        <h2 class="text-lg font-bold text-green-800 flex items-center gap-2"><span
            class="w-2 h-2 bg-green-600 rounded-full"></span>Campanha</h2>

        <div class="space-y-1">
          <label class="block text-xs font-bold text-gray-500 uppercase required-asterisk flex items-center gap-1">
            Nome (max 34)
          </label>
          <input type="text" id="campNome" maxlength="34" placeholder="ex: Campanha Gov Digital" aria-required="true"
            class="w-full px-4 py-3 bg-white border border-green-200 rounded-xl outline-none focus:ring-4 focus:ring-green-200 transition">
          <div id="campNomeCounter" class="char-counter">0/34</div>
        </div>

        <div class="space-y-1">
          <label class="block text-xs font-bold text-gray-500 uppercase required-asterisk">Data Início</label>
          <input type="date" id="campDataInicio" aria-required="true"
            class="w-full px-4 py-3 bg-white border border-green-200 rounded-xl outline-none focus:ring-4 focus:ring-green-200 transition">
        </div>

        <div class="space-y-1">
          <label class="block text-xs font-bold text-gray-500 uppercase required-asterisk">País</label>
          <select id="campPais" aria-required="true"
            class="w-full px-4 py-3 bg-white border border-green-200 rounded-xl outline-none focus:ring-4 focus:ring-green-200 transition">
            <option value="">Selecione um país</option>
          </select>
        </div>

        <div id="campBrasilOptions" class="hidden space-y-3 transition-fade">
          <div class="flex gap-4">
            <label class="flex items-center gap-2 text-xs tooltip" data-tooltip="Adiciona sigla da região (ex: BRA-R1)">
              <input type="radio" name="campNacionalSubTipo" value="regiao" checked> Região
            </label>
            <label class="flex items-center gap-2 text-xs tooltip" data-tooltip="Adiciona sigla do estado (ex: BRA-SP)">
              <input type="radio" name="campNacionalSubTipo" value="uf"> UF
            </label>
          </div>

          <div id="campRegiaoContainer">
            <label class="block text-xs font-bold text-gray-500 uppercase">Região</label>
            <select id="campRegiao"
              class="w-full px-4 py-3 bg-white border border-green-200 rounded-xl outline-none focus:ring-4 focus:ring-green-200 transition">
              <option value="">Selecione uma região</option>
            </select>
          </div>

          <div id="campUfContainer" class="hidden">
            <label class="block text-xs font-bold text-gray-500 uppercase">UF</label>
            <select id="campUf"
              class="w-full px-4 py-3 bg-white border border-green-200 rounded-xl outline-none focus:ring-4 focus:ring-green-200 transition">
              <option value="">Selecione uma UF</option>
            </select>
          </div>
        </div>

        <div class="pt-3 border-t border-green-100">
          <label class="block text-xs font-bold text-gray-400 uppercase">Nome Eloqua da Campanha</label>
          <input type="text" id="campEloqua" readonly
            class="w-full mt-1 px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl text-sm font-mono text-gray-600">
        </div>
      </div>

      <!-- COLUNA DIREITA: EVENTO (nosso formulário completo) -->
      <div class="section-event bg-blue-50/50 rounded-2xl border border-blue-100 p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-bold text-blue-800 flex items-center gap-2"><span
              class="w-2 h-2 bg-blue-600 rounded-full"></span>Evento</h2>
          <button onclick="resetEventForm()" class="text-xs text-blue-600 hover:underline">Limpar evento</button>
        </div>

        <!-- Abas do evento (Principais / Detalhamento) -->
        <div class="flex border-b border-blue-100 bg-blue-50/30 rounded-t-xl overflow-hidden">
          <button type="button" onclick="switchEventTab('main')" id="btn-event-tab-main"
            class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 transition-all tab-active">
            Principais
          </button>
          <button type="button" onclick="switchEventTab('extra')" id="btn-event-tab-extra"
            class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 transition-all tab-inactive">
            Detalhamento
          </button>
        </div>

        <form id="eventForm" class="space-y-4">
          <input type="hidden" id="editingEventId" />

          <!-- Aba Principais -->
          <div id="event-tab-main" class="space-y-4">
            <!-- Nome com contador -->
            <div class="space-y-1 relative">
              <div class="flex justify-between items-center">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nome do Evento * (máx. 34)</label>
                <span id="eventNomeCounter2" class="char-counter text-xs font-bold">0/34</span>
              </div>
              <input type="text" id="eventNome" required maxlength="34" placeholder="Digite o nome..."
                class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
              <div id="autocomplete-event-list" class="autocomplete-list"></div>
            </div>

            <!-- Eloqua do evento (gerado automaticamente) -->
            <div class="p-3 bg-gray-50 rounded-xl border border-gray-200 space-y-2">
              <div class="flex items-center justify-between">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Identificação Eloqua do Evento</label>
                <button type="button" onclick="copyEloquaCodeEvent()" class="text-gray-400 hover:text-blue-600 transition-colors p-1 rounded-lg hover:bg-blue-50" title="Copiar">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
              <input type="text" id="eventEloqua" readonly
                class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl text-sm font-mono text-gray-600">
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500 uppercase required-asterisk">Ano</label>
                <select id="eventAno"
                  class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
                  <option value="2024">2024</option>
                  <option value="2025">2025</option>
                  <option value="2026" selected>2026</option>
                  <option value="2027">2027</option>
                </select>
              </div>
              <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500 uppercase required-asterisk">Mês</label>
                <select id="eventMes"
                  class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
                  <option value="">Selecione</option>
                  <!-- Preenchido via JS -->
                </select>
              </div>
            </div>

            <!-- Checkboxes Presencial e Transmitido via web -->
            <div class="space-y-1">
              <label class="checkbox-label">
                <input type="checkbox" id="presencial" class="checkbox-input" onchange="toggleLocationFields()" checked>
                Presencial
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="transmitidoWeb" class="checkbox-input">
                Transmitido via web
              </label>
            </div>

            <!-- Bloco de localização (oculto se Presencial não marcado) -->
            <div id="locationBlock">
              <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500 uppercase required-asterisk">País</label>
                <select id="eventPais" onchange="toggleEventUf(); generateEventEloquaField();"
                  class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
                  <option value="">Selecione um país</option>
                </select>
              </div>
              <div id="eventUfContainer" class="hidden transition-fade space-y-1">
                <label class="block text-xs font-bold text-gray-500 uppercase">UF (se Brasil)</label>
                <select id="eventUf" onchange="generateEventEloquaField();"
                  class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
                  <option value="">Selecione uma UF</option>
                </select>
              </div>
              <div id="containerLocalidadeEvento" class="hidden space-y-1">
                <label class="block text-xs font-bold text-gray-500 uppercase">Localidade Internacional</label>
                <input type="text" id="localidadeInternacionalEvento" placeholder="Cidade..."
                  class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
              </div>
            </div>
          </div>

          <!-- Aba Detalhamento -->
          <div id="event-tab-extra" class="hidden space-y-4">
            <div class="space-y-1">
              <label class="block text-xs font-bold text-gray-500 uppercase">Financiamento</label>
              <select id="financiamento"
                class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
                <option value="Área origem">Área origem</option>
                <option value="Corporativo">Corporativo</option>
                <option value="Externo">Externo</option>
                <option value="Educacional (SUPED)">Educacional (SUPED)</option>
              </select>
            </div>

            <div class="space-y-2">
              <label class="block text-xs font-bold text-gray-500 uppercase">Mercado Alvo</label>
              <div class="flex gap-4 flex-wrap">
                <label class="checkbox-label">
                  <input type="checkbox" name="mercadoAlvo" value="Público" class="checkbox-input"> Público
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="mercadoAlvo" value="Privado" class="checkbox-input"> Privado
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="mercadoAlvo" value="Internacional" class="checkbox-input"> Internacional
                </label>
              </div>
            </div>

            <div class="space-y-1">
              <label class="block text-xs font-bold text-gray-500 uppercase">Stand</label>
              <select id="stand"
                class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
                <option value="">Selecione...</option>
                <option value="Próprio">Próprio</option>
                <option value="Compartilhado">Compartilhado</option>
              </select>
            </div>

            <!-- Descrição/Justificativa -->
            <div class="space-y-1">
              <div class="flex items-center justify-between">
                <label class="block text-xs font-bold text-gray-500 uppercase">Descrição/Justificativa</label>
                <div class="flex items-center gap-1">
                  <button type="button" onclick="copiarJustificativa()" class="text-gray-400 hover:text-blue-600 transition-colors p-1 rounded-lg hover:bg-blue-50" title="Copiar">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                  <button type="button" onclick="gerarJustificativa()" class="text-gray-400 hover:text-blue-600 transition-colors p-1 rounded-lg hover:bg-blue-50 text-xs font-bold flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Gerar
                  </button>
                </div>
              </div>
              <textarea id="descEvento" rows="4"
                class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none resize-none focus:ring-4 focus:ring-blue-200 transition"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500 uppercase">Data Início</label>
                <input type="date" id="dataInicioEvento"
                  class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
              </div>
              <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500 uppercase">Data Fim</label>
                <input type="date" id="dataFimEvento"
                  class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
              </div>
            </div>

            <!-- Endereço (visível se Presencial marcado) -->
            <div id="enderecoContainer" class="p-4 bg-slate-50 rounded-2xl border border-slate-200 space-y-3">
              <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                  <label class="block text-[9px] font-black text-slate-400 uppercase">CEP</label>
                  <input type="text" id="cepEvento" placeholder="00000-000" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <div class="col-span-2 space-y-1">
                  <label class="block text-[9px] font-black text-slate-400 uppercase">Endereço</label>
                  <input type="text" id="enderecoEvento" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
                </div>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                  <label class="block text-[9px] font-black text-slate-400 uppercase">Município</label>
                  <input type="text" id="municipioEvento" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <div class="space-y-1">
                  <label class="block text-[9px] font-black text-slate-400 uppercase">Local de realização</label>
                  <input type="text" id="localLivre" placeholder="Ex: Auditório" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
                </div>
              </div>
            </div>

            <!-- Campos sincronizados -->
            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200 space-y-3">
              <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                  <label class="block text-[9px] font-black text-slate-400 uppercase">UF sincronizada</label>
                  <input type="text" id="ufEventoSync" readonly
                    class="w-full px-3 py-2 bg-slate-100 border border-slate-200 rounded-lg text-sm text-slate-500">
                </div>
                <div class="space-y-1">
                  <label class="block text-[9px] font-black text-slate-400 uppercase">País sincronizado</label>
                  <input type="text" id="paisEventoSync" readonly
                    class="w-full px-3 py-2 bg-slate-100 border border-slate-200 rounded-lg text-sm text-slate-500">
                </div>
              </div>
            </div>

            <!-- Site e Tags -->
            <div class="space-y-1">
              <label class="block text-xs font-bold text-gray-500 uppercase">Site Oficial</label>
              <input type="text" id="siteEvento" placeholder="https://..."
                class="w-full px-4 py-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-200 transition">
            </div>

            <div class="space-y-2">
              <button type="button" onclick="gerarTagsComIA(event)"
                class="w-full py-2 bg-purple-600 text-white text-xs font-bold rounded-lg hover:bg-purple-700 transition-colors">
                Gerar Tags Automaticamente
              </button>
              <label class="block text-xs font-bold text-gray-500 uppercase">Tags</label>
              <div id="tagsContainer" class="flex flex-wrap gap-1 p-2 bg-slate-50 border border-slate-200 rounded-xl min-h-[42px]"></div>
              <div class="flex gap-2">
                <input type="text" id="tagInputManual" placeholder="Nova tag..."
                  class="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                <button type="button" onclick="adicionarTagManual()"
                  class="px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700 transition-colors">
                  Adicionar
                </button>
              </div>
            </div>
          </div>

          <button type="submit" id="btnSubmitEvento"
            class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg transition-all uppercase tracking-widest text-[10px]">
            Salvar Evento
          </button>
        </form>
      </div>
    </div>

    <!-- NOME COMBINADO / GERADO -->
    <div class="bg-gray-50 rounded-2xl border border-gray-200 p-6">
      <label class="block text-xs font-bold text-gray-500 uppercase mb-1" id="combinedLabel">Nome Eloqua Gerado</label>
      <div class="relative flex items-center">
        <input type="text" id="combinedEloqua" readonly
          class="w-full px-5 py-4 bg-white border border-gray-300 rounded-xl font-mono text-sm pr-16 transition-all duration-200">
        <button id="copyBtn" onclick="copyCombined(event)"
          class="absolute right-2 p-2 text-gray-400 hover:text-indigo-600 transition-colors tooltip"
          data-tooltip="Copiar para área de transferência" aria-label="Copiar nome gerado">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>
    <p class="text-xs text-gray-400 text-center">Os nomes são atualizados automaticamente. Dica: use Ctrl+L para limpar tudo.</p>
  </div>

  <!-- Toast de notificação -->
  <div id="toast"
    class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg text-sm z-50">
    Copiado!
  </div>

  <script>
    (function() {
      // ---------- Verificação de dependências externas ----------
      if (typeof paises === 'undefined' || typeof ufs === 'undefined' || typeof regioes === 'undefined') {
        alert('Erro ao carregar os dados (paises.js, ufs.js, regiao.js). Recarregue a página ou contate o suporte.');
        console.error('Dados externos não carregados.');
        return;
      }

      // ---------- Dados ----------
      const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
      const mesesNum = {
        "Janeiro": "01", "Fevereiro": "02", "Março": "03", "Abril": "04", "Maio": "05", "Junho": "06",
        "Julho": "07", "Agosto": "08", "Setembro": "09", "Outubro": "10", "Novembro": "11", "Dezembro": "12"
      };

      // ---------- Estado do Evento (nosso) ----------
      let currentEventTags = [];

      // ---------- Referências DOM (campanha e combinado) ----------
      const modeRadios = document.querySelectorAll('input[name="mode"]');
      const sectionCamp = document.querySelector('.section-campaign');
      const sectionEvent = document.querySelector('.section-event');
      const combinedInput = document.getElementById('combinedEloqua');
      const combinedLabel = document.getElementById('combinedLabel');

      // ---------- Funções auxiliares (toast, contador) ----------
      function showToast(message = "Copiado!") {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }

      function updateCharCounter(inputId, counterId) {
        const input = document.getElementById(inputId);
        const counter = document.getElementById(counterId);
        if (input && counter) {
          const len = input.value.length;
          counter.textContent = `${len}/34`;
          counter.classList.remove('text-orange-500', 'text-red-600');
          if (len >= 30) counter.classList.add('text-orange-500');
          if (len >= 34) counter.classList.add('text-red-600');
        }
      }

      // ---------- Preencher selects (campanha e evento) ----------
      function populateAll() {
        try {
          // Campanha: país
          const campPais = document.getElementById('campPais');
          const sortedPaises = paises.slice().sort((a, b) => a.nome.localeCompare(b.nome));
          const brasil = sortedPaises.find(p => p.nome.toUpperCase() === 'BRASIL');
          if (brasil) {
            campPais.add(new Option(brasil.nome, brasil.nome));
            campPais.add(new Option('-----------', ''));
            campPais.options[campPais.options.length - 1].disabled = true;
          }
          sortedPaises.filter(p => p.nome.toUpperCase() !== 'BRASIL').forEach(p => campPais.add(new Option(p.nome, p.nome)));

          // Campanha: região e UF
          const campRegiao = document.getElementById('campRegiao');
          regioes.forEach(r => {
            const sigla = r.sigla || r.nome.substring(0, 2).toUpperCase();
            campRegiao.add(new Option(r.nome, sigla));
          });
          const campUf = document.getElementById('campUf');
          ufs.forEach(u => campUf.add(new Option(u.sigla, u.sigla)));

          // Evento: país (com Brasil no topo)
          const eventPais = document.getElementById('eventPais');
          if (brasil) {
            eventPais.add(new Option(brasil.nome, brasil.nome));
            eventPais.add(new Option('-----------', ''));
            eventPais.options[eventPais.options.length - 1].disabled = true;
          }
          sortedPaises.filter(p => p.nome.toUpperCase() !== 'BRASIL').forEach(p => eventPais.add(new Option(p.nome, p.nome)));

          // Evento: UF
          const eventUf = document.getElementById('eventUf');
          ufs.forEach(u => eventUf.add(new Option(u.sigla, u.sigla)));

          // Evento: meses
          const eventMes = document.getElementById('eventMes');
          meses.forEach(m => eventMes.add(new Option(m, m)));

          // Evento: autocomplete precisa dos eventos mock (será populado depois)
        } catch (e) {
          console.warn('Erro ao popular selects:', e);
          showToast('Erro ao carregar opções');
        }
      }

      // ---------- Funções de visibilidade (modo, Brasil, UF) ----------
      function updateModeVisibility() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        if (mode === 'campaign') {
          sectionCamp.classList.remove('hidden-section');
          sectionEvent.classList.add('hidden-section');
          combinedLabel.textContent = 'Nome Eloqua da Campanha';
        } else if (mode === 'event') {
          sectionCamp.classList.add('hidden-section');
          sectionEvent.classList.remove('hidden-section');
          combinedLabel.textContent = 'Nome Eloqua do Evento';
        } else {
          sectionCamp.classList.remove('hidden-section');
          sectionEvent.classList.remove('hidden-section');
          combinedLabel.textContent = 'Nome Eloqua Combinado (Campanha + Evento)';
        }
        combine();
      }

      function toggleCampBrasilOptions() {
        const pais = document.getElementById('campPais').value;
        document.getElementById('campBrasilOptions').classList.toggle('hidden', !(pais && pais.toUpperCase() === 'BRASIL'));
        toggleCampNacionalSub();
      }

      function toggleCampNacionalSub() {
        const sub = document.querySelector('input[name="campNacionalSubTipo"]:checked')?.value;
        const regiaoContainer = document.getElementById('campRegiaoContainer');
        const ufContainer = document.getElementById('campUfContainer');
        if (sub === 'uf') {
          regiaoContainer.classList.add('hidden');
          ufContainer.classList.remove('hidden');
        } else {
          regiaoContainer.classList.remove('hidden');
          ufContainer.classList.add('hidden');
        }
      }

      function toggleEventUf() {
        const pais = document.getElementById('eventPais').value;
        const ufContainer = document.getElementById('eventUfContainer');
        const localidadeContainer = document.getElementById('containerLocalidadeEvento');
        if (pais && pais.toUpperCase() === 'BRASIL') {
          ufContainer.classList.remove('hidden');
          localidadeContainer.classList.add('hidden');
        } else {
          ufContainer.classList.add('hidden');
          if (pais) {
            localidadeContainer.classList.remove('hidden');
          } else {
            localidadeContainer.classList.add('hidden');
          }
        }
        syncEventLocationFields();
      }

      function syncEventLocationFields() {
        const ufVal = document.getElementById('eventUf').value || '';
        const paisVal = document.getElementById('eventPais').value || '';
        document.getElementById('ufEventoSync').value = ufVal || '-';
        document.getElementById('paisEventoSync').value = paisVal || '-';
      }

      // ---------- Geração do nome Eloqua do evento (nosso) ----------
      function generateEventEloquaName(paisNome, uf, mesNome, anoLongo, nome) {
        let paisSigla = 'XX';
        if (paisNome.toUpperCase() === 'BRASIL') {
          paisSigla = 'BRA';
        } else {
          const paisEncontrado = paises.find(p => p.nome.toUpperCase() === paisNome.toUpperCase());
          if (paisEncontrado) paisSigla = paisEncontrado.sigla;
        }
        const ufPart = (paisNome.toUpperCase() === 'BRASIL' && uf) ? `-${uf}` : '';
        const mm = mesesNum[mesNome] || '00';
        const yy = anoLongo ? String(anoLongo).slice(-2) : '00';
        const nomeLimitado = nome.substring(0, 34);
        const nomeCompleto = `E[${paisSigla}${ufPart}.${mm}/${yy}.${nomeLimitado}]`;
        return nomeCompleto.substring(0, 50);
      }

      function generateEventEloquaField() {
        const nome = document.getElementById('eventNome').value.trim() || '';
        const ano = document.getElementById('eventAno').value || '';
        const mes = document.getElementById('eventMes').value || '';
        const pais = document.getElementById('eventPais').value || '';
        const uf = document.getElementById('eventUf').value || '';
        const field = document.getElementById('eventEloqua');
        if (field && nome && ano && mes && pais) {
          field.value = generateEventEloquaName(pais, uf, mes, ano, nome);
        } else {
          field.value = '';
        }
        combine();
      }

      // ---------- Geração do nome da campanha (mantida do original) ----------
      function generateCampaignEloqua() {
        try {
          const nome = document.getElementById('campNome').value.trim();
          const dataInicio = document.getElementById('campDataInicio').value;
          const paisNome = document.getElementById('campPais').value;
          if (!nome || !dataInicio || !paisNome) {
            document.getElementById('campEloqua').value = '';
            return;
          }
          let paisSigla = 'BRA';
          const p = paises.find(p => p.nome === paisNome);
          if (p) paisSigla = p.sigla;

          let sufixo = '';
          if (paisNome.toUpperCase() === 'BRASIL') {
            const sub = document.querySelector('input[name="campNacionalSubTipo"]:checked')?.value;
            if (sub === 'uf') {
              const uf = document.getElementById('campUf').value;
              if (uf) sufixo = `-${uf}`;
            } else {
              const regiaoSigla = document.getElementById('campRegiao').value;
              if (regiaoSigla) sufixo = `-${regiaoSigla}`;
            }
          }

          let mm = '00', yy = '00';
          if (dataInicio.match(/^\d{4}-\d{2}-\d{2}$/)) {
            const [, mes, ano] = dataInicio.split('-');
            mm = mes;
            yy = ano.slice(-2);
          }
          const nomeLimitado = nome.substring(0, 34);
          const completo = `C[${paisSigla}${sufixo}.${mm}/${yy}.${nomeLimitado}]`;
          document.getElementById('campEloqua').value = completo.substring(0, 50);
        } catch (e) {
          console.warn('Erro ao gerar nome da campanha:', e);
          document.getElementById('campEloqua').value = '';
        }
        combine();
      }

      // ---------- Combinar conforme modo ----------
      function combine() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const camp = document.getElementById('campEloqua').value;
        const evt = document.getElementById('eventEloqua').value;

        if (mode === 'campaign') {
          combinedInput.value = camp || '';
        } else if (mode === 'event') {
          combinedInput.value = evt || '';
        } else {
          combinedInput.value = (camp + evt) || '';
        }

        if (combinedInput.value) {
          combinedInput.classList.add('bg-indigo-50', 'border-indigo-300');
        } else {
          combinedInput.classList.remove('bg-indigo-50', 'border-indigo-300');
        }
      }

      // ---------- Copiar combinado ----------
      function copyCombined(event) {
        const input = document.getElementById('combinedEloqua');
        if (!input.value) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(input.value).then(() => showToast("Copiado!")).catch(() => fallbackCopy(input));
        } else {
          fallbackCopy(input);
        }
      }

      function fallbackCopy(input) {
        input.select();
        try {
          document.execCommand('copy');
          showToast("Copiado!");
        } catch (err) {
          showToast("Erro ao copiar");
        }
        input.blur();
      }

      // ---------- Funções do evento (nosso formulário) ----------
      // Abas
      function switchEventTab(tab) {
        document.getElementById('event-tab-main').classList.toggle('hidden', tab !== 'main');
        document.getElementById('event-tab-extra').classList.toggle('hidden', tab !== 'extra');
        const btnMain = document.getElementById('btn-event-tab-main');
        const btnExtra = document.getElementById('btn-event-tab-extra');
        btnMain.className = `flex-1 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 transition-all ${tab === 'main' ? 'tab-active' : 'tab-inactive'}`;
        btnExtra.className = `flex-1 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 transition-all ${tab === 'extra' ? 'tab-active' : 'tab-inactive'}`;
      }

      // Toggle location fields (presencial)
      function toggleLocationFields() {
        const isPresencial = document.getElementById('presencial').checked;
        const locationBlock = document.getElementById('locationBlock');
        const enderecoContainer = document.getElementById('enderecoContainer');
        const syncContainer = document.querySelector('#event-tab-extra .p-4.bg-slate-50:last-of-type');
        if (!isPresencial) {
          locationBlock.style.display = 'none';
          enderecoContainer.style.display = 'none';
          if (syncContainer) syncContainer.style.display = 'none';
          // Limpa valores
          document.getElementById('eventUf').value = '';
          document.getElementById('localidadeInternacionalEvento').value = '';
          document.getElementById('cepEvento').value = '';
          document.getElementById('enderecoEvento').value = '';
          document.getElementById('municipioEvento').value = '';
          document.getElementById('localLivre').value = '';
          document.getElementById('ufEventoSync').value = '-';
          document.getElementById('paisEventoSync').value = '-';
          document.getElementById('eventPais').disabled = true;
        } else {
          locationBlock.style.display = '';
          enderecoContainer.style.display = '';
          if (syncContainer) syncContainer.style.display = '';
          document.getElementById('eventPais').disabled = false;
          toggleEventUf();
          syncEventLocationFields();
        }
      }

      // Copiar Eloqua do evento
      function copyEloquaCodeEvent() {
        const input = document.getElementById('eventEloqua');
        if (!input.value) { alert('Nenhum código Eloqua gerado para copiar.'); return; }
        const btn = document.querySelector('[onclick="copyEloquaCodeEvent()"]');
        const originalHtml = btn.innerHTML;
        const checkIcon = `<svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(input.value).then(() => {
            btn.innerHTML = checkIcon;
            setTimeout(() => btn.innerHTML = originalHtml, 1500);
          }).catch(() => fallbackCopy(input));
        } else {
          fallbackCopy(input);
        }
      }

      // Funções de tags
      function renderTags() {
        const container = document.getElementById('tagsContainer');
        if (!container) return;
        container.innerHTML = '';
        currentEventTags.forEach((tagObj, index) => {
          const chip = document.createElement('span');
          chip.className = tagObj.automatica ? 'tag-automatica' : 'tag-manual';
          chip.innerHTML = `${tagObj.texto} <span class="tag-remove" onclick="removerTag(${index})">×</span>`;
          container.appendChild(chip);
        });
      }

      function adicionarTagManual() {
        const input = document.getElementById('tagInputManual');
        const texto = input.value.trim();
        if (!texto) return;
        const existe = currentEventTags.some(t => t.texto.toLowerCase() === texto.toLowerCase());
        if (existe) { alert('Tag já existe!'); return; }
        currentEventTags.push({ texto, automatica: false });
        input.value = '';
        renderTags();
      }

      function removerTag(index) {
        currentEventTags.splice(index, 1);
        renderTags();
      }

      async function gerarTagsComIA(event) {
        let siteUrl = document.getElementById('siteEvento').value.trim();
        if (!siteUrl) { alert('Por favor, insira a URL do site primeiro.'); return; }
        if (!siteUrl.startsWith('http://') && !siteUrl.startsWith('https://')) siteUrl = 'https://' + siteUrl;
        try { new URL(siteUrl); } catch { alert('URL inválida.'); return; }
        const btn = event.target;
        const textoOriginal = btn.innerText;
        btn.innerText = '🔍 Analisando site...';
        btn.disabled = true;
        try {
          const response = await fetch('http://localhost:5000/api/scrape-tags', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: siteUrl })
          });
          const data = await response.json();
          if (data.error) { alert('Erro: ' + data.error); return; }
          if (data.tags && data.tags.length > 0) {
            data.tags.forEach(tag => {
              const existe = currentEventTags.some(t => t.texto.toLowerCase() === tag.toLowerCase());
              if (!existe) currentEventTags.push({ texto: tag, automatica: true, geradoPorIA: true });
            });
            renderTags();
            alert(`${data.tags.length} tag(s) gerada(s) com sucesso!`);
          } else alert('Nenhuma tag identificada no site.');
        } catch (error) {
          console.error('Erro:', error);
          alert('Erro ao conectar com o serviço de IA.');
        } finally {
          btn.innerText = textoOriginal;
          btn.disabled = false;
        }
      }

      // Gerar justificativa (com Eloqua no início)
      function gerarJustificativa() {
        const nome = document.getElementById('eventNome').value.trim() || '';
        const eloqua = document.getElementById('eventEloqua').value.trim() || '';
        const ano = document.getElementById('eventAno').value || '';
        const mes = document.getElementById('eventMes').value || '';
        const pais = document.getElementById('eventPais').value || '';
        const uf = document.getElementById('eventUf').value || '';
        const localIntl = document.getElementById('localidadeInternacionalEvento').value.trim() || '';
        const financiamento = document.getElementById('financiamento').value || '';
        const mercadoAlvo = Array.from(document.querySelectorAll('input[name="mercadoAlvo"]:checked')).map(cb => cb.value);
        const presencial = document.getElementById('presencial').checked;
        const transmitido = document.getElementById('transmitidoWeb').checked;
        const site = document.getElementById('siteEvento').value.trim() || '';
        const localLivre = document.getElementById('localLivre').value.trim() || '';
        const dataInicio = document.getElementById('dataInicioEvento').value;
        const dataFim = document.getElementById('dataFimEvento').value;
        const stand = document.getElementById('stand').value;

        function formatDate(dateStr) {
          if (!dateStr) return '';
          const parts = dateStr.split('-');
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        const dataInicioFormatada = formatDate(dataInicio);
        const dataFimFormatada = formatDate(dataFim);

        let localizacao = '';
        if (pais) {
          localizacao = pais;
          if (pais.toUpperCase() === 'BRASIL' && uf) localizacao += ` - ${uf}`;
          else if (localIntl) localizacao += ` - ${localIntl}`;
        }

        let modalidade = '';
        if (presencial && transmitido) modalidade = 'presencial e transmitido via web';
        else if (presencial) modalidade = 'presencial';
        else if (transmitido) modalidade = 'transmitido via web';

        let partes = [];
        if (nome) {
          let periodo = '';
          if (mes && ano) periodo = ` ${mes} de ${ano}`;
          partes.push(`O evento "${nome}"${periodo}`);
        } else {
          partes.push('Este evento');
        }
        if (localizacao) partes.push(`acontecerá em ${localizacao}`);
        if (dataInicioFormatada) {
          if (dataFimFormatada) partes.push(`no período de ${dataInicioFormatada} a ${dataFimFormatada}`);
          else partes.push(`na data de ${dataInicioFormatada}`);
        }
        if (modalidade) {
          if (presencial && localLivre) partes.push(`será realizado na modalidade ${modalidade} no local ${localLivre}`);
          else partes.push(`será realizado na modalidade ${modalidade}`);
        } else if (presencial && localLivre) {
          partes.push(`será realizado no local ${localLivre}`);
        }
        if (stand) partes.push(`com stand ${stand.toLowerCase()}`);
        if (financiamento && financiamento !== 'Área origem') partes.push(`com financiamento do tipo ${financiamento}`);
        if (mercadoAlvo.length) partes.push(`voltado para o mercado ${mercadoAlvo.join(', ')}`);
        if (site) partes.push(`e site oficial ${site}`);

        let descricao = '';
        for (let i = 0; i < partes.length; i++) {
          let p = partes[i];
          if (i === 0) descricao += p;
          else {
            if (i === partes.length - 1) descricao += ` e ${p}`;
            else descricao += `, ${p}`;
          }
        }
        descricao += '.';

        let justificativa = '';
        if (eloqua) justificativa += `**Identificação Eloqua:** ${eloqua}\n\n`;
        justificativa += 'Acrescente aqui a justificativa personalizada desse evento:\n\n';
        justificativa += descricao;

        const textarea = document.getElementById('descEvento');
        textarea.value = justificativa;
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
      }

      function copiarJustificativa() {
        const textarea = document.getElementById('descEvento');
        const text = textarea.value.trim();
        if (!text) { alert('Não há conteúdo para copiar.'); return; }
        const btn = document.querySelector('[onclick="copiarJustificativa()"]');
        const originalHtml = btn.innerHTML;
        const checkIcon = `<svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = checkIcon;
            setTimeout(() => btn.innerHTML = originalHtml, 1500);
          }).catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      }

      // ---------- Reset dos formulários ----------
      function resetEventForm() {
        document.getElementById('eventForm').reset();
        document.getElementById('editingEventId').value = '';
        document.getElementById('btnSubmitEvento').innerText = 'Salvar Evento';
        document.getElementById('btnSubmitEvento').className = 'w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg transition-all uppercase tracking-widest text-[10px]';
        document.querySelectorAll('input[name="mercadoAlvo"]').forEach(cb => cb.checked = false);
        document.getElementById('financiamento').value = 'Área origem';
        document.getElementById('presencial').checked = true;
        document.getElementById('transmitidoWeb').checked = false;
        document.getElementById('stand').value = '';
        currentEventTags = [];
        renderTags();
        toggleLocationFields();
        generateEventEloquaField();
        updateCharCounter('eventNome', 'eventNomeCounter2');
        document.getElementById('eventPais').value = '';
        toggleEventUf();
        syncEventLocationFields();
      }

      function resetAll() {
        // Reset campanha
        document.getElementById('campNome').value = '';
        document.getElementById('campDataInicio').value = '';
        document.getElementById('campPais').value = '';
        document.querySelector('input[name="campNacionalSubTipo"][value="regiao"]').checked = true;
        document.getElementById('campRegiao').value = '';
        document.getElementById('campUf').value = '';
        document.getElementById('campEloqua').value = '';
        updateCharCounter('campNome', 'campNomeCounter');

        // Reset evento
        resetEventForm();

        // Reset modo para "both"
        document.querySelector('input[name="mode"][value="both"]').checked = true;
        updateModeVisibility();

        // Limpar combinado
        combinedInput.value = '';
        combinedInput.classList.remove('bg-indigo-50', 'border-indigo-300');
      }

      // ---------- Autocomplete (baseado nos eventos mock, se houver) ----------
      function setupAutocomplete() {
        const input = document.getElementById('eventNome');
        const list = document.getElementById('autocomplete-event-list');
        // Usaremos uma lista vazia por enquanto (pode ser populada com eventos mock)
        input.addEventListener('input', () => {
          const val = input.value.trim().toLowerCase();
          list.innerHTML = '';
          if (!val) { list.classList.add('hidden'); return; }
          // Se tivermos eventos mock, podemos usar; senão, vazio
          const matches = []; // Poderia ser preenchido com eventos existentes
          if (!matches.length) { list.classList.add('hidden'); return; }
          list.classList.remove('hidden');
          matches.forEach(match => {
            const div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.textContent = match;
            div.onclick = () => {
              input.value = match;
              list.classList.add('hidden');
              generateEventEloquaField();
              updateCharCounter('eventNome', 'eventNomeCounter2');
            };
            list.appendChild(div);
          });
        });
        document.addEventListener('click', (e) => {
          if (e.target !== input) list?.classList.add('hidden');
        });
      }

      // ---------- Validação ao sair do campo (campanha e evento) ----------
      function addValidationListeners() {
        const requiredSelectors = ['#campNome', '#campDataInicio', '#campPais', '#eventNome', '#eventAno', '#eventMes', '#eventPais'];
        requiredSelectors.forEach(sel => {
          const input = document.querySelector(sel);
          if (input) {
            input.addEventListener('blur', () => {
              if (!input.value.trim()) input.classList.add('invalid');
              else input.classList.remove('invalid');
            });
            input.addEventListener('input', () => input.classList.remove('invalid'));
          }
        });
      }

      // ---------- Event listeners ----------
      function init() {
        populateAll();
        resetAll();
        addValidationListeners();

        // Campanha
        document.getElementById('campNome').addEventListener('input', function() {
          updateCharCounter('campNome', 'campNomeCounter');
          generateCampaignEloqua();
        });
        document.getElementById('campDataInicio').addEventListener('change', generateCampaignEloqua);
        document.getElementById('campPais').addEventListener('change', function() {
          toggleCampBrasilOptions();
          generateCampaignEloqua();
          if (!this.value) this.classList.add('invalid');
        });
        document.querySelectorAll('input[name="campNacionalSubTipo"]').forEach(r => {
          r.addEventListener('change', function() {
            toggleCampNacionalSub();
            generateCampaignEloqua();
          });
        });
        document.getElementById('campRegiao').addEventListener('change', generateCampaignEloqua);
        document.getElementById('campUf').addEventListener('change', generateCampaignEloqua);

        // Evento
        document.getElementById('eventNome').addEventListener('input', function() {
          updateCharCounter('eventNome', 'eventNomeCounter2');
          generateEventEloquaField();
        });
        document.getElementById('eventAno').addEventListener('change', generateEventEloquaField);
        document.getElementById('eventMes').addEventListener('change', generateEventEloquaField);
        document.getElementById('eventPais').addEventListener('change', function() {
          toggleEventUf();
          generateEventEloquaField();
          if (!this.value) this.classList.add('invalid');
        });
        document.getElementById('eventUf').addEventListener('change', function() {
          generateEventEloquaField();
          syncEventLocationFields();
        });
        document.getElementById('localidadeInternacionalEvento').addEventListener('input', function() {
          syncEventLocationFields();
        });

        // Reset global
        document.getElementById('resetBtn').addEventListener('click', resetAll);

        // Modo
        modeRadios.forEach(radio => radio.addEventListener('change', updateModeVisibility));

        // Submissão do evento (apenas para demonstração, mantém a lógica de salvamento)
        document.getElementById('eventForm').addEventListener('submit', function(e) {
          e.preventDefault();
          alert('Evento salvo (simulação).');
          // Aqui poderia ser implementada a persistência.
        });

        // Inicializar contadores e visibilidade
        updateCharCounter('campNome', 'campNomeCounter');
        updateCharCounter('eventNome', 'eventNomeCounter2');
        toggleLocationFields();
        updateModeVisibility();
        generateCampaignEloqua();
        generateEventEloquaField();
        setupAutocomplete();
      }

      // Expor funções globalmente para os onclick
      window.switchEventTab = switchEventTab;
      window.toggleLocationFields = toggleLocationFields;
      window.copyEloquaCodeEvent = copyEloquaCodeEvent;
      window.gerarTagsComIA = gerarTagsComIA;
      window.adicionarTagManual = adicionarTagManual;
      window.removerTag = removerTag;
      window.gerarJustificativa = gerarJustificativa;
      window.copiarJustificativa = copiarJustificativa;
      window.resetEventForm = resetEventForm;
      window.copyCombined = copyCombined;

      init();
    })();
  </script>
</body>
